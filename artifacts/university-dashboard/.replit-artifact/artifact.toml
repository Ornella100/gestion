kind = "web"
previewPath = "/"
title = "Tableau de Bord Universitaire"
version = "1.0.0"
id = "artifacts/university-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20935

[services.development]
run = "pnpm --filter @workspace/university-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/university-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/university-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20935"
BASE_PATH = "/"
